<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Team Todo</title>
<script src="/sortable.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:13px;background:#f0f0f0;height:100vh;overflow:hidden}

/* ── Layout ── */
.layout{display:flex;height:100vh;overflow:hidden}

/* ── Sidebar ── */
.sidebar{width:180px;min-width:180px;background:#1e1e2e;color:#cdd6f4;display:flex;flex-direction:column;overflow:hidden}

.ws-status{padding:8px 14px;font-size:11px;font-weight:600;letter-spacing:.3px;border-bottom:1px solid #313244;display:flex;align-items:center;gap:6px}
.ws-status .dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.ws-status.on .dot{background:#a6e3a1}
.ws-status.off .dot{background:#585b70}
.ws-status.on{color:#a6e3a1}
.ws-status.off{color:#585b70}

.username-box{padding:10px 12px;border-bottom:1px solid #313244}
.username-box label{font-size:10px;text-transform:uppercase;letter-spacing:1px;color:#585b70;display:block;margin-bottom:5px}
.username-row{display:flex;gap:4px}
.username-row input{flex:1;min-width:0;background:#313244;color:#cdd6f4;border:1px solid #45475a;border-radius:5px;padding:5px 7px;font-size:12px;outline:none}
.username-row input:focus{border-color:#89b4fa}
.username-row button{padding:5px 8px;background:#89b4fa;color:#1e1e2e;border:none;border-radius:5px;cursor:pointer;font-size:11px;font-weight:700;white-space:nowrap}
.username-row button:hover{background:#74c7ec}

.sidebar-section{padding:6px 14px 4px;font-size:10px;text-transform:uppercase;letter-spacing:1.2px;color:#585b70;font-weight:700}
.user-list{flex:1;overflow-y:auto;padding:4px 0}
.user-item{padding:7px 14px;cursor:pointer;border-left:3px solid transparent;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;transition:background .1s;display:flex;align-items:center;gap:5px}
.user-item:hover{background:#313244}
.user-item.active{background:#313244;border-left-color:#89b4fa;color:#cdd6f4}
.user-item .me-badge{font-size:9px;color:#a6e3a1;background:#1e3a2a;border-radius:3px;padding:1px 4px;flex-shrink:0}

.settings-area{padding:8px 14px;border-top:1px solid #313244}
.settings-area label{display:flex;align-items:center;gap:7px;cursor:pointer;font-size:12px;color:#a6adc8;user-select:none}
.settings-area input[type=checkbox]{width:14px;height:14px;cursor:pointer;accent-color:#89b4fa}

.sidebar-footer{padding:10px 12px;border-top:1px solid #313244}
.btn-export{width:100%;padding:7px 0;background:#313244;color:#cdd6f4;border:1px solid #45475a;border-radius:6px;cursor:pointer;font-size:12px;transition:background .1s}
.btn-export:hover{background:#45475a}

/* ── Main ── */
.main{flex:1;display:flex;flex-direction:column;min-width:0;overflow:hidden}
.main-header{background:#fff;border-bottom:1px solid #ddd;padding:10px 14px;display:flex;align-items:center;gap:10px;flex-shrink:0}
.main-header h2{font-size:14px;font-weight:600;color:#222}
.btn-add-root{padding:5px 12px;background:#89b4fa;color:#1e1e2e;border:none;border-radius:5px;cursor:pointer;font-size:12px;font-weight:700;transition:background .1s}
.btn-add-root:hover{background:#74c7ec}
.btn-add-root:disabled{opacity:.35;cursor:not-allowed}

/* ── Table ── */
.table-wrap{flex:1;overflow:auto;background:#f5f5f5}

:root{
  --col-ops:90px;
  --col-task:220px;
  --col-status:160px;
  --col-result:200px;
  --col-risk:180px;
  --col-due:120px;
  --col-priority:78px;
  --col-progress:78px;
  --col-note:160px;
}

.tbl-header{
  display:flex;align-items:center;
  background:#e8e8e8;border-bottom:2px solid #ccc;
  position:sticky;top:0;z-index:20;
  font-size:11px;font-weight:700;color:#555;
  padding:6px 0;
}
.tbl-header>div{padding:0 6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex-shrink:0;position:relative}
.col-resizer{position:absolute;right:0;top:0;bottom:0;width:5px;cursor:col-resize;z-index:1;user-select:none}
.col-resizer:hover,.col-resizer.resizing{background:rgba(137,180,250,.55)}

.item-row{
  display:flex;align-items:stretch;
  border-bottom:1px solid #e4e4e4;
  background:#fff;
  min-height:34px;
}
.item-row:hover{background:#fafafa}
.item-row.completed-row{opacity:.65}

/* ── Columns ── */
.c-first{width:calc(var(--col-ops) + var(--col-task));min-width:calc(var(--col-ops) + var(--col-task));display:flex;align-items:stretch;flex-shrink:0}
.c-ops{display:flex;align-items:center;gap:1px;padding:2px 3px;flex-shrink:0}
.c-task{flex:1;min-width:0;display:flex;align-items:center;gap:4px}
.c-status{width:var(--col-status);min-width:var(--col-status);flex-shrink:0;display:flex;align-items:center}
.c-result{width:var(--col-result);min-width:var(--col-result);flex-shrink:0;display:flex;align-items:center}
.c-risk{width:var(--col-risk);min-width:var(--col-risk);flex-shrink:0;display:flex;align-items:center}
.c-due{width:var(--col-due);min-width:var(--col-due);flex-shrink:0;display:flex;align-items:center}
.c-priority{width:var(--col-priority);min-width:var(--col-priority);flex-shrink:0;display:flex;align-items:center}
.c-progress{width:var(--col-progress);min-width:var(--col-progress);flex-shrink:0;display:flex;align-items:center}
.c-note{width:var(--col-note);min-width:var(--col-note);flex-shrink:0;display:flex;align-items:center}

.indent{display:inline-block;flex-shrink:0}
.drag-handle{cursor:grab;color:#bbb;font-size:15px;padding:0 2px;user-select:none;line-height:1}
.drag-handle:active{cursor:grabbing}
.drag-handle:hover{color:#888}

.btn-collapse{border:none;background:none;cursor:pointer;font-size:10px;padding:1px 3px;border-radius:3px;line-height:1;color:#888;flex-shrink:0;width:16px;text-align:center}
.btn-collapse:hover{background:#f0f0f0;color:#333}
.btn-collapse.no-children{visibility:hidden}

.btn-add-child,.btn-del,.btn-transfer{border:none;background:none;cursor:pointer;font-size:13px;padding:1px 2px;border-radius:3px;line-height:1;flex-shrink:0}
.btn-add-child{color:#4caf50}.btn-add-child:hover{background:#e8f5e9}
.btn-del{color:#e53935}.btn-del:hover{background:#ffebee}
.btn-transfer{color:#888;font-size:11px}.btn-transfer:hover{background:#ede7f6;color:#7c4dff}

.chk-done{width:14px;height:14px;cursor:pointer;flex-shrink:0;accent-color:#89b4fa;margin:0 2px}

.transfer-sel{font-size:12px;padding:3px 4px;border:1px solid #ccc;border-radius:4px;background:#fff;cursor:pointer;max-width:90px}

.sortable-ghost{opacity:.35;background:#c8ebfb!important}
.sortable-chosen{background:#e3f0ff!important}
.sortable-drag{opacity:.9}
.sortable-group{min-height:2px}

input[type=text],input[type=number],input[type=date],select.field-sel{
  width:100%;border:none;background:transparent;
  padding:5px 6px;font-size:13px;color:#333;
  outline:none;font-family:inherit;
}
input[type=text]:focus,input[type=number]:focus,input[type=date]:focus,select.field-sel:focus{background:#e8f0fe;border-radius:3px}
input[type=number]{-moz-appearance:textfield}
input[type=number]::-webkit-inner-spin-button{opacity:1}
select.field-sel{cursor:pointer}
.ro-cell{padding:5px 6px;color:#444;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;width:100%;font-size:13px}

/* ── Toast ── */
#toast{
  position:fixed;top:14px;right:14px;
  background:#f57c00;color:#fff;
  padding:9px 14px;border-radius:8px;
  font-size:13px;max-width:320px;
  z-index:999;box-shadow:0 4px 14px rgba(0,0,0,.2);
  display:none;line-height:1.4;
}
</style>
</head>
<body>
<div class="layout">

  <!-- Sidebar -->
  <div class="sidebar">
    <div class="ws-status off" id="ws-status">
      <span class="dot"></span><span id="ws-label">未連線</span>
    </div>

    <div class="username-box">
      <label>我的名稱</label>
      <div class="username-row">
        <input type="text" id="username-input" placeholder="設定名稱" maxlength="20">
        <button id="btn-set-name">確認</button>
      </div>
    </div>

    <div class="sidebar-section">成員</div>
    <div class="user-list" id="user-list"></div>

    <div class="settings-area">
      <label><input type="checkbox" id="hide-completed"> 隱藏已完成</label>
    </div>

    <div class="sidebar-footer">
      <button class="btn-export" onclick="exportExcel()">⬇ 匯出 Excel</button>
    </div>
  </div>

  <!-- Main -->
  <div class="main">
    <div class="main-header">
      <h2 id="viewing-label">—</h2>
      <button class="btn-add-root" id="btn-add-root" disabled onclick="addRootItem()">＋ 新增項目</button>
    </div>
    <div class="table-wrap">
      <div class="tbl-header">
        <div style="width:calc(var(--col-ops) + var(--col-task));text-align:center">工作項目<div class="col-resizer" data-col="task"></div></div>
        <div style="width:var(--col-status)">目前進度<div class="col-resizer" data-col="status"></div></div>
        <div style="width:var(--col-result)">成果/下一步計畫<div class="col-resizer" data-col="result"></div></div>
        <div style="width:var(--col-risk)">風險/需要協助事項<div class="col-resizer" data-col="risk"></div></div>
        <div style="width:var(--col-due)">預定完成日期<div class="col-resizer" data-col="due"></div></div>
        <div style="width:var(--col-priority)">優先順序<div class="col-resizer" data-col="priority"></div></div>
        <div style="width:var(--col-progress)">進度%<div class="col-resizer" data-col="progress"></div></div>
        <div style="width:var(--col-note)">備註<div class="col-resizer" data-col="note"></div></div>
      </div>
      <div id="items-root"></div>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
// ── State ──────────────────────────────────────────────────────────────────
let allItems   = [];
let allUsers   = [];
let currentUser = '';
let myUsername  = localStorage.getItem('todo_username') || '';
let ws;
let sortableInstances = [];
const dirtyItems    = new Set();  // item ids with unsaved edits
const collapsedItems = new Set(JSON.parse(sessionStorage.getItem('collapsed') || '[]'));
let hideCompleted = false;

// ── WebSocket ──────────────────────────────────────────────────────────────

function connect() {
  ws = new WebSocket('ws://' + location.host);

  ws.onopen = () => {
    setConn(true);
    if (myUsername) send({ type: 'set_username', name: myUsername });
  };

  ws.onmessage = ({ data }) => {
    let msg;
    try { msg = JSON.parse(data); } catch { return; }

    if (msg.type === 'sync_all') {
      allItems = msg.items || [];
      allUsers = msg.users || [];
      if (msg.settings) applySettings(msg.settings);
      if (!currentUser) currentUser = myUsername || (allUsers[0] && allUsers[0].name) || '';
      applySync();
    } else if (msg.type === 'settings') {
      applySettings(msg.settings);
      renderItems();
    } else if (msg.type === 'conflict') {
      const idx = allItems.findIndex(i => i.id === msg.item.id);
      if (idx >= 0) allItems[idx] = msg.item;
      dirtyItems.delete(msg.item.id);
      applySync();
      showToast(msg.message || '資料衝突，已更新為最新版本');
    } else if (msg.type === 'error') {
      showToast(msg.message);
    }
  };

  ws.onclose = () => { setConn(false); setTimeout(connect, 3000); };
  ws.onerror = () => ws.close();
}

function send(data) {
  if (ws && ws.readyState === 1) ws.send(JSON.stringify(data));
}

function setConn(on) {
  const el = document.getElementById('ws-status');
  el.className = 'ws-status ' + (on ? 'on' : 'off');
  document.getElementById('ws-label').textContent = on ? '已連線' : '已斷線';
}

function applySettings(s) {
  hideCompleted = !!s.hide_completed;
  document.getElementById('hide-completed').checked = hideCompleted;
}

function applySync() {
  renderUserList();
  renderItems();
}

// ── Username ────────────────────────────────────────────────────────────────

document.getElementById('username-input').value = myUsername;

document.getElementById('btn-set-name').addEventListener('click', setUsername);
document.getElementById('username-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') setUsername();
});

function setUsername() {
  const input = document.getElementById('username-input');
  const name  = input.value.trim();
  if (!/^[一-龥a-zA-Z_]{1,20}$/.test(name)) {
    showToast('名稱僅限中文、英文及底線，長度 1-20 字');
    return;
  }
  const old_name = myUsername || undefined;
  myUsername = name;
  if (!currentUser) currentUser = name;
  localStorage.setItem('todo_username', name);
  send({ type: 'set_username', name, old_name: old_name !== name ? old_name : undefined });
}

// ── Settings ────────────────────────────────────────────────────────────────

document.getElementById('hide-completed').addEventListener('change', e => {
  hideCompleted = e.target.checked;
  send({ type: 'update_settings', hide_completed: hideCompleted });
  renderItems();
});

// ── Render: User List ───────────────────────────────────────────────────────

function renderUserList() {
  const registered = new Set(allUsers.map(u => u.name));
  const extraOwners = [...new Set(allItems.map(i => i.owner))].filter(o => !registered.has(o));
  const names = [...allUsers.map(u => u.name), ...extraOwners];

  if (!currentUser && names.length > 0) currentUser = myUsername || names[0];

  const list = document.getElementById('user-list');
  list.innerHTML = '';
  for (const name of names) {
    const d = document.createElement('div');
    d.className = 'user-item' + (name === currentUser ? ' active' : '');
    const nameSpan = document.createElement('span');
    nameSpan.style.cssText = 'overflow:hidden;text-overflow:ellipsis;flex:1;min-width:0';
    nameSpan.textContent = name;
    d.appendChild(nameSpan);
    if (name === myUsername) {
      const badge = document.createElement('span');
      badge.className = 'me-badge';
      badge.textContent = '我';
      d.appendChild(badge);
    }
    d.onclick = () => { currentUser = name; renderUserList(); renderItems(); };
    list.appendChild(d);
  }
}

// ── Render: Items ───────────────────────────────────────────────────────────

function renderItems() {
  // Save dirty input values + focus state
  const savedValues = {};
  for (const id of dirtyItems) {
    const wrap = document.querySelector(`.item-wrap[data-id="${id}"]`);
    if (wrap) {
      savedValues[id] = {};
      wrap.querySelectorAll('[data-key]').forEach(el => {
        savedValues[id][el.dataset.key] = el.value;
      });
    }
  }
  const focused    = document.activeElement;
  const focusedWrap = focused?.closest('.item-wrap');
  const focusedId   = focusedWrap?.dataset.id;
  const focusedKey  = focused?.dataset?.key;
  const focusedSel  = [focused?.selectionStart, focused?.selectionEnd];

  // Destroy sortable instances
  for (const s of sortableInstances) s.destroy();
  sortableInstances = [];

  const canEdit = !!myUsername;
  document.getElementById('btn-add-root').disabled = !canEdit;
  document.getElementById('viewing-label').textContent =
    currentUser + (currentUser === myUsername ? ' (我)' : '');

  const userItems = allItems.filter(i => i.owner === currentUser);
  const visible   = hideCompleted ? userItems.filter(i => !i.completed) : userItems;

  const maxD = Math.min(computeMaxDepth(visible), 8);
  document.documentElement.style.setProperty('--col-ops', (maxD * 24 + 72) + 'px');

  const root = document.getElementById('items-root');
  root.innerHTML = '';
  const roots = visible.filter(i => !i.parent_id).sort((a, b) => a.sort_order - b.sort_order);
  root.appendChild(buildGroup(null, roots, visible, canEdit, 0));

  // Restore dirty values
  for (const [id, vals] of Object.entries(savedValues)) {
    const wrap = document.querySelector(`.item-wrap[data-id="${id}"]`);
    if (!wrap) continue;
    wrap.querySelectorAll('[data-key]').forEach(el => {
      if (el.dataset.key in vals) el.value = vals[el.dataset.key];
    });
  }

  // Restore focus
  if (focusedId && focusedKey) {
    const wrap = document.querySelector(`.item-wrap[data-id="${focusedId}"]`);
    const el   = wrap?.querySelector(`[data-key="${focusedKey}"]`);
    if (el) {
      el.focus();
      try { el.setSelectionRange(focusedSel[0], focusedSel[1]); } catch {}
    }
  }
}

function computeMaxDepth(items) {
  const byId = Object.fromEntries(items.map(i => [i.id, i]));
  const memo = {};
  function depth(id) {
    if (id in memo) return memo[id];
    const item = byId[id];
    return (memo[id] = item?.parent_id ? depth(item.parent_id) + 1 : 0);
  }
  return items.reduce((m, i) => Math.max(m, depth(i.id)), 0);
}

function buildGroup(parentId, siblings, allUserItems, canEdit, depth) {
  const grp = document.createElement('div');
  grp.className = 'sortable-group';
  grp.dataset.parentId = parentId ?? 'root';

  if (collapsedItems.has(parentId)) {
    grp.style.display = 'none';
  }

  for (const item of siblings) {
    const wrap = document.createElement('div');
    wrap.className = 'item-wrap';
    wrap.dataset.id = item.id;

    wrap.appendChild(buildRow(item, allUserItems, canEdit, depth));

    const children = allUserItems
      .filter(i => i.parent_id === item.id)
      .sort((a, b) => a.sort_order - b.sort_order);
    wrap.appendChild(buildGroup(item.id, children, allUserItems, canEdit, depth + 1));

    grp.appendChild(wrap);
  }

  if (canEdit) {
    const inst = Sortable.create(grp, {
      handle: '.drag-handle',
      animation: 120,
      group: 'g-' + (parentId ?? 'root'),
      ghostClass: 'sortable-ghost',
      chosenClass: 'sortable-chosen',
      dragClass: 'sortable-drag',
      onEnd() {
        const order = [...grp.children].map((w, idx) => ({ id: w.dataset.id, sort_order: idx }));
        send({ type: 'reorder_items', items: order });
      }
    });
    sortableInstances.push(inst);
  }

  return grp;
}

function buildRow(item, allUserItems, canEdit, depth) {
  const row = document.createElement('div');
  row.className = 'item-row' + (item.completed ? ' completed-row' : '');
  row.dataset.id = item.id;

  const hasChildren = allUserItems.some(i => i.parent_id === item.id);
  const indentPx    = Math.min(depth, 8) * 24;

  // ── Ops column ──
  const ops = document.createElement('div');
  ops.className = 'c-ops';

  const indent = document.createElement('span');
  indent.className = 'indent';
  indent.style.width = indentPx + 'px';
  ops.appendChild(indent);

  // Collapse toggle
  const collapseBtn = document.createElement('button');
  collapseBtn.className = 'btn-collapse' + (hasChildren ? '' : ' no-children');
  collapseBtn.textContent = collapsedItems.has(item.id) ? '▶' : '▼';
  collapseBtn.title = '展開/收合';
  collapseBtn.onclick = () => toggleCollapse(item.id, collapseBtn);
  ops.appendChild(collapseBtn);

  if (canEdit) {
    const handle = document.createElement('span');
    handle.className = 'drag-handle';
    handle.title = '拖曳排序';
    handle.textContent = '⠿';
    ops.appendChild(handle);

    const addBtn = document.createElement('button');
    addBtn.className = 'btn-add-child';
    addBtn.title = '新增子項目';
    addBtn.textContent = '＋';
    addBtn.onclick = () => addChild(item.id, item.owner);
    ops.appendChild(addBtn);

    const delBtn = document.createElement('button');
    delBtn.className = 'btn-del';
    delBtn.title = '刪除';
    delBtn.textContent = '×';
    delBtn.onclick = () => deleteItem(item.id, item.task);
    ops.appendChild(delBtn);

    // Transfer button
    if (allUsers.length > 1) {
      const transferBtn = document.createElement('button');
      transferBtn.className = 'btn-transfer';
      transferBtn.title = '轉移任務';
      transferBtn.textContent = '↗';
      transferBtn.onclick = () => showTransfer(transferBtn, item);
      ops.appendChild(transferBtn);
    }
  }

  // ── First column (ops + task) ──
  const firstCol = document.createElement('div');
  firstCol.className = 'c-first';
  firstCol.appendChild(ops);
  row.appendChild(firstCol);

  // ── Task cell (with completed checkbox) ──
  const taskCell = document.createElement('div');
  taskCell.className = 'c-task';

  if (canEdit) {
    const chk = document.createElement('input');
    chk.type = 'checkbox';
    chk.className = 'chk-done';
    chk.checked = !!item.completed;
    chk.title = item.completed ? '取消完成' : '標記完成';
    chk.onchange = () => {
      send({ type: 'update_item', id: item.id, updated_at: item.updated_at, completed: chk.checked });
      item.updated_at = Date.now();
    };
    taskCell.appendChild(chk);
  }

  firstCol.appendChild(taskCell);

  // ── Data columns ──
  const dataCols = [
    { key: 'task',        cls: 'c-task',     type: 'text',   container: taskCell },
    { key: 'status',      cls: 'c-status',   type: 'text'   },
    { key: 'result_plan', cls: 'c-result',   type: 'text'   },
    { key: 'risk_help',   cls: 'c-risk',     type: 'text'   },
    { key: 'due_date',    cls: 'c-due',      type: 'date'   },
    { key: 'priority',    cls: 'c-priority', type: 'select', opts: ['高','中','低'] },
    { key: 'progress',    cls: 'c-progress', type: 'number' },
    { key: 'note',        cls: 'c-note',     type: 'text'   },
  ];

  for (const col of dataCols) {
    const target = col.container;  // if container set, append to it; else create new cell
    const cell = target ? null : document.createElement('div');
    if (cell) cell.className = col.cls;

    if (canEdit) {
      let input;
      if (col.type === 'select') {
        input = document.createElement('select');
        input.className = 'field-sel';
        for (const o of col.opts) {
          const opt = document.createElement('option');
          opt.value = o; opt.textContent = o;
          if (item[col.key] === o) opt.selected = true;
          input.appendChild(opt);
        }
      } else {
        input = document.createElement('input');
        input.type = col.type;
        input.value = item[col.key] ?? '';
        if (col.type === 'number') { input.min = 0; input.max = 100; }
      }
      input.dataset.key = col.key;

      input.oninput = () => dirtyItems.add(item.id);

      input.onblur = () => {
        if (!dirtyItems.has(item.id)) return;
        const live = allItems.find(i => i.id === item.id);
        if (!live) { dirtyItems.delete(item.id); return; }
        const val = col.type === 'number' ? (parseInt(input.value) || 0) : input.value;
        send({ type: 'update_item', id: item.id, updated_at: live.updated_at, [col.key]: val });
        live.updated_at = Date.now();
        dirtyItems.delete(item.id);
      };

      input.onkeydown = e => {
        if (e.key === 'Escape') {
          input.value = item[col.key] ?? '';
          dirtyItems.delete(item.id);
          input.blur();
        }
      };

      (target ?? cell).appendChild(input);
    } else {
      const ro = document.createElement('div');
      ro.className = 'ro-cell';
      ro.title = String(item[col.key] ?? '');
      ro.textContent = item[col.key] ?? '';
      (target ?? cell).appendChild(ro);
    }

    if (cell) row.appendChild(cell);
  }

  return row;
}

// ── Collapse ────────────────────────────────────────────────────────────────

function toggleCollapse(id, btn) {
  const wrap = document.querySelector(`.item-wrap[data-id="${id}"]`);
  if (!wrap) return;
  const childGrp = wrap.querySelector(':scope > .sortable-group');
  if (!childGrp) return;

  if (collapsedItems.has(id)) {
    collapsedItems.delete(id);
    childGrp.style.display = '';
    if (btn) btn.textContent = '▼';
  } else {
    collapsedItems.add(id);
    childGrp.style.display = 'none';
    if (btn) btn.textContent = '▶';
  }
  sessionStorage.setItem('collapsed', JSON.stringify([...collapsedItems]));
}

// ── Transfer ────────────────────────────────────────────────────────────────

function showTransfer(btn, item) {
  const others = allUsers.filter(u => u.name !== item.owner);
  if (others.length === 0) return showToast('沒有其他用戶可以轉移');

  const sel = document.createElement('select');
  sel.className = 'transfer-sel';
  sel.innerHTML = '<option value="">轉移給…</option>' +
    others.map(u => `<option value="${esc(u.name)}">${esc(u.name)}</option>`).join('');

  sel.onchange = () => {
    if (!sel.value) return;
    if (confirm(`確定將「${item.task || '(未命名)'}」及其子項目轉移給 ${sel.value}？`)) {
      send({ type: 'transfer_item', id: item.id, new_owner: sel.value });
    }
    cleanup();
  };
  sel.onblur = cleanup;

  function cleanup() {
    sel.remove();
    btn.style.display = '';
  }

  btn.style.display = 'none';
  btn.parentNode.insertBefore(sel, btn.nextSibling);
  sel.focus();
}

// ── Actions ─────────────────────────────────────────────────────────────────

function addRootItem() { send({ type: 'create_item', owner: currentUser, parent_id: null,    task: '新項目'   }); }
function addChild(pid, owner) { send({ type: 'create_item', owner, parent_id: pid, task: '新子項目' }); }

function deleteItem(id, task) {
  const hasKids = allItems.some(i => i.parent_id === id);
  const msg = hasKids
    ? `確定刪除「${task}」及其所有子項目？`
    : `確定刪除「${task}」？`;
  if (confirm(msg)) send({ type: 'delete_item', id });
}

function exportExcel() { window.open('/export', '_blank'); }

// ── Utils ────────────────────────────────────────────────────────────────────

function esc(s) {
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.style.display = 'block';
  clearTimeout(el._t);
  el._t = setTimeout(() => el.style.display = 'none', 5000);
}

// ── Column resize ──────────────────────────────────────────────────────────
const RESIZABLE_COLS = ['task','status','result','risk','due','priority','progress','note'];

function getCookie(name) {
  const m = document.cookie.match(new RegExp('(?:^|; )' + name.replace(/[.*+?^${}()|[\]\\]/g,'\\$&') + '=([^;]*)'));
  return m ? decodeURIComponent(m[1]) : null;
}

function saveColWidths() {
  const widths = {};
  for (const col of RESIZABLE_COLS) {
    const v = getComputedStyle(document.documentElement).getPropertyValue('--col-' + col).trim();
    if (v) widths[col] = parseInt(v);
  }
  document.cookie = 'col_widths=' + encodeURIComponent(JSON.stringify(widths)) + ';path=/;max-age=' + (365*24*3600);
}

function initResizers() {
  const saved = getCookie('col_widths');
  if (saved) {
    try {
      const widths = JSON.parse(saved);
      for (const [k, v] of Object.entries(widths)) {
        if (RESIZABLE_COLS.includes(k) && Number.isFinite(v) && v >= 40)
          document.documentElement.style.setProperty('--col-' + k, v + 'px');
      }
    } catch {}
  }
  for (const el of document.querySelectorAll('.col-resizer')) {
    el.addEventListener('mousedown', e => {
      e.preventDefault();
      const col = el.dataset.col;
      const startX = e.clientX;
      const startW = parseInt(getComputedStyle(document.documentElement).getPropertyValue('--col-' + col)) || 80;
      el.classList.add('resizing');
      const onMove = e => {
        document.documentElement.style.setProperty('--col-' + col, Math.max(40, startW + e.clientX - startX) + 'px');
      };
      const onUp = () => {
        el.classList.remove('resizing');
        saveColWidths();
        document.removeEventListener('mousemove', onMove);
        document.removeEventListener('mouseup', onUp);
      };
      document.addEventListener('mousemove', onMove);
      document.addEventListener('mouseup', onUp);
    });
  }
}

connect();
initResizers();
</script>
